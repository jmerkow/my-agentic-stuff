# Slop Words & Phrases Reference
# Flat list of rules, each tagged with a rule ID and level.
# Patterns are Python regexes matched case-insensitively.
# Fields: rule (kebab-case ID), level (high/medium/low/info),
#         pattern (regex), suggestion, note (optional), unless (optional exemption regex).

# ── Dead openers / closers ───────────────────────────────────────────────────────
- rule: dead-opener
  level: high
  pattern: "in today's (?:fast-paced|digital|ever-changing|rapidly evolving) (?:world|landscape|era|age)"
  suggestion: "Cut entirely. Open with a specific claim or fact."

- rule: dead-opener
  level: high
  pattern: "in the ever-evolving landscape"
  suggestion: "Cut entirely."

- rule: dead-opener
  level: high
  pattern: "now more than ever"
  suggestion: "Cut entirely or cite what changed."

- rule: dead-opener
  level: high
  pattern: "it's no secret that"
  suggestion: "Cut entirely — if it's no secret, just state the fact."

- rule: dead-opener
  level: high
  pattern: "have you ever wondered"
  suggestion: "Cut entirely. Just make the point."

- rule: dead-opener
  level: high
  pattern: "in conclusion"
  suggestion: "Cut if the conclusion is obvious from context."

- rule: dead-opener
  level: high
  pattern: "at the end of the day"
  suggestion: "Cut entirely."

- rule: dead-opener
  level: high
  pattern: "when all is said and done"
  suggestion: "Cut entirely."

