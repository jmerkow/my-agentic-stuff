# ── Fake authority ───────────────────────────────────────────────────────────────
- rule: fake-authority
  level: 3
  fix_type: substantiate
  pattern: "studies (?:have )?show(?:n|s)?"
  suggestion: "Name the study or delete the claim."
  note: "Acceptable if immediately followed by a specific citation."

- rule: fake-authority
  level: 3
  fix_type: substantiate
  pattern: "research (?:has )?(?:demonstrated|suggests|indicates|confirms)"
  suggestion: "Name the research or delete the claim."
  note: "Acceptable if immediately followed by a specific citation."

- rule: fake-authority
  level: 3
  fix_type: substantiate
  pattern: "experts agree"
  suggestion: "Name the experts or delete."

- rule: fake-authority
  level: 3
  fix_type: substantiate
  pattern: "(?:industry )?leaders (?:have )?recogni[sz]ed?"
  suggestion: "Name them or delete."

- rule: fake-authority
  level: 3
  fix_type: substantiate
  pattern: "the data speaks for itself"
  suggestion: "Show the data instead."

- rule: fake-authority
  level: 3
  fix_type: substantiate
  pattern: "as we all know"
  suggestion: "Delete — readers know what they know."

