# ── Slop Cop additions: filler and certainty ───────────────────────────────────
- rule: filler-adverb
  level: 2
  fix_type: delete
  pattern: "\\b(?:importantly|essentially|fundamentally|ultimately|inherently|undoubtedly|obviously|clearly|basically)\\b"
  suggestion: "Cut the adverb or rewrite so the sentence earns the emphasis."

- rule: almost-hedge
  level: 2
  fix_type: rewrite
  pattern: "\\balmost\\s+(?:always|never|certainly|exclusively|entirely|completely|invariably|universally)\\b"
  suggestion: "Use a precise qualifier like 'usually' or commit to the claim."

- rule: era-opener
  level: 3
  fix_type: delete
  pattern: "\\bin\\s+(?:an?\\s+era|a world)\\s+(?:of|where|when|in which)\\b"
  suggestion: "Delete the setup clause and start at the real point."

# ── Slop Cop additions: inflated register ──────────────────────────────────────
- rule: elevated-register
  level: 2
  fix_type: replace
  pattern: "\\b(?:commence(?:d|ment)?|endeavou?r(?:s|ed|ing)?|elucidat(?:e|es|ed|ing)|promulgat(?:e|es|ed|ing)|cognizant|pertaining to|in regards to|with regards to|at this juncture|in terms of)\\b"
  suggestion: "Use plain language: start, try, explain, spread, aware, about, now, or cut the phrase."

- rule: elevated-register
  level: 2
  fix_type: rewrite
  pattern: "\\b(?:moving|going) forward\\b"
  suggestion: "Name the next step or use a date."

# ── Slop Cop additions: stock metaphors and dodges ─────────────────────────────
- rule: metaphor-crutch
  level: 2
  fix_type: rewrite
  pattern: "\\b(?:double[- ]edged sword|tip of the iceberg|north star|building blocks|elephant in the room|perfect storm|low[- ]hanging fruit|move the needle|think outside the box|silver bullet|boil(?:ing)? the ocean|circle back|deep dive|level up|hit the ground running|the devil is in the details|on the same page|reinvent the wheel|touch base|bandwidth|bleeding edge|best of breed)\\b"
  suggestion: "Replace the stock metaphor with plain language or a concrete image from the subject."
  note: "Some terms are literal in technical or domain-specific contexts."

- rule: broader-implications
  level: 2
  fix_type: substantiate
  pattern: "\\b(?:broader|wider) implications?\\b"
  suggestion: "State the specific implication or cut the phrase."

- rule: serves-as-dodge
  level: 2
  fix_type: replace
  pattern: "\\b(?:serves|stands|acts|functions)\\s+as\\b"
  suggestion: "Use 'is' or 'are' unless the phrase adds a real functional distinction."

# ── Slop Cop additions: suspense and teacher-mode setup ────────────────────────
- rule: suspense-transition
  level: 2
  fix_type: delete
  pattern: "\\bhere(?:'|’)?s\\s+(?:the kicker|the thing|where it gets interesting|what most people miss|the real)\\b"
  suggestion: "Delete the suspense transition and state the point directly."

- rule: pedagogical-aside
  level: 2
  fix_type: delete
  pattern: "\\b(?:let(?:'|’)?s\\s+(?:break this down|unpack|explore|dive in|examine)|think of (?:it|this) as|think of it like)\\b"
  suggestion: "Skip the teacher-mode preamble and explain directly."

- rule: imagine-world
  level: 2
  fix_type: delete
  pattern: "\\bimagine\\s+(?:a world|if you|what would|a future)\\b"
  suggestion: "Start with the actual argument instead of asking the reader to imagine it."

# ── Slop Cop additions: vague attribution and empty caveats ────────────────────
- rule: vague-attribution
  level: 3
  fix_type: substantiate
  pattern: "\\b(?:experts (?:argue|say|suggest|believe|note)|industry analysts|observers (?:have )?(?:noted|cited|argue)|analysts (?:note|suggest)|many experts|several experts|some experts|according to experts)\\b"
  suggestion: "Name the source, cite it, or drop the claim."

- rule: empty-concession
  level: 2
  fix_type: substantiate
  pattern: "\\bdespite (?:these|its|the|their|all|such)\\b[^.!?]{0,80}\\b(?:challenge|obstacle|limitation|difficult|drawback|shortcoming)"
  suggestion: "Name the specific challenge or cut the concession."

# ── Slop Cop additions: invented labels and intensifiers ───────────────────────
- rule: invented-concept-label
  level: 1
  fix_type: rewrite
  pattern: "\\b[a-z]+\\s+(?:paradox|trap|creep|vacuum|inversion|chasm)\\b"
  suggestion: "Use an established term or describe the phenomenon plainly."

- rule: overused-intensifier
  level: 1
  fix_type: rewrite
  pattern: "\\b(?:crucial|vital|comprehensive|fundamental|noteworthy|nuanced|unprecedented|dynamic|enduring|interplay|intricate|intricacies|valuable|vibrant)\\b"
  suggestion: "Delete the intensifier if the sentence still works, otherwise show the evidence behind it."

