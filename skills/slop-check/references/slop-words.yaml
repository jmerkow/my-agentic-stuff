# Slop Words & Phrases Reference
# Organized by severity. Each entry has a pattern (regex-capable) and a suggestion.
# The linter uses this file directly — keep patterns lowercase for case-insensitive matching.

# ── SEVERITY: HIGH ──────────────────────────────────────────────────────────────
# These almost always indicate slop. Require explicit justification to keep.
high:
  # Dead openers / closers
  - pattern: "in today's (?:fast-paced|digital|ever-changing|rapidly evolving) (?:world|landscape|era|age)"
    suggestion: "Cut entirely. Open with a specific claim or fact."
  - pattern: "in the ever-evolving landscape"
    suggestion: "Cut entirely."
  - pattern: "now more than ever"
    suggestion: "Cut entirely or cite what changed."
  - pattern: "it's no secret that"
    suggestion: "Cut entirely — if it's no secret, just state the fact."
  - pattern: "have you ever wondered"
    suggestion: "Cut entirely. Just make the point."
  - pattern: "in conclusion"
    suggestion: "Cut if the conclusion is obvious from context."
  - pattern: "at the end of the day"
    suggestion: "Cut entirely."
  - pattern: "when all is said and done"
    suggestion: "Cut entirely."

  # Filler hedges that add zero information
  - pattern: "it's important to note that"
    suggestion: "Delete and state the fact directly."
  - pattern: "it's worth noting that"
    suggestion: "Delete and state the fact directly."
  - pattern: "it goes without saying"
    suggestion: "If it goes without saying, don't say it."
  - pattern: "the fact of the matter is"
    suggestion: "Delete and state the fact directly."
  - pattern: "needless to say"
    suggestion: "Delete — then just say it."

  # Fake authority with no citation
  - pattern: "studies (?:have )?show(?:n|s)?"
    suggestion: "Name the study or delete the claim."
    note: "Acceptable if immediately followed by a specific citation."
  - pattern: "research (?:has )?(?:demonstrated|suggests|indicates|confirms)"
    suggestion: "Name the research or delete the claim."
    note: "Acceptable if immediately followed by a specific citation."
  - pattern: "experts agree"
    suggestion: "Name the experts or delete."
  - pattern: "(?:industry )?leaders (?:have )?recogni[sz]ed?"
    suggestion: "Name them or delete."
  - pattern: "the data speaks for itself"
    suggestion: "Show the data instead."
  - pattern: "as we all know"
    suggestion: "Delete — readers know what they know."

  # Pseudo-insight / fortune cookie
  - pattern: "the key is to find balance"
    suggestion: "State the specific tradeoff instead."
  - pattern: "true growth comes from within"
    suggestion: "Replace with a specific mechanism."
  - pattern: "it's not about the destination.*journey"
    suggestion: "Delete cliché. Say what it IS about."
  - pattern: "everything happens for a reason"
    suggestion: "Delete."
  - pattern: "the only limit is (?:the one )?you(?:rself)? set"
    suggestion: "Delete."
  - pattern: "something shifted"
    suggestion: "Say what shifted."
  - pattern: "and that changed everything"
    suggestion: "Say what changed and how."
  - pattern: "but (?:here's the thing|now\\?)"
    suggestion: "Just make the point."
  - pattern: "let that sink in"
    suggestion: "Delete. If it's impactful, it will sink in."

  # Wellness slop
  - pattern: "self-care isn't selfish"
    suggestion: "Delete platitude."
  - pattern: "honor your journey"
    suggestion: "Delete."
  - pattern: "you are enough"
    suggestion: "Delete."
  - pattern: "embrace your authentic self"
    suggestion: "Delete."
  - pattern: "give yourself grace"
    suggestion: "Delete."

  # Wikipedia rehash signals
  - pattern: "(?:X |it )?is (?:broadly )?defined as"
    suggestion: "Skip the definition if the audience already knows the term."
  - pattern: "(?:X |it )?refers to (?:the process of|a)"
    suggestion: "Skip or give an original angle."
  - pattern: "can be (?:broadly )?categori[sz]ed into"
    suggestion: "Skip taxonomy if it's common knowledge."
  - pattern: "there are (?:several|many|three main|various) types of"
    suggestion: "Skip enumeration unless adding original analysis."

# ── SEVERITY: MEDIUM ────────────────────────────────────────────────────────────
# Frequently sloppy but sometimes defensible. Flag for review.
medium:
  # Overused intensifiers / weasel words
  - pattern: "\\bleverage\\b"
    suggestion: "Use 'use' unless referring to financial leverage."
  - pattern: "\\butilize\\b"
    suggestion: "Use 'use'."
  - pattern: "\\bin order to\\b"
    suggestion: "Use 'to'."
  - pattern: "\\ba myriad of\\b"
    suggestion: "Use 'many' or a specific number."
  - pattern: "\\bmultifaceted\\b"
    suggestion: "Name the specific facets or use 'complex'."
  - pattern: "\\brobust\\b"
    suggestion: "Describe the specific property (reliable, tested, scalable)."
  - pattern: "\\bseamless(?:ly)?\\b"
    suggestion: "Describe what actually makes it smooth."
  - pattern: "\\bsynerg(?:y|ies|istic)\\b"
    suggestion: "Describe the actual interaction."
  - pattern: "\\bholistic(?:ally)?\\b"
    suggestion: "Describe what's included."
  - pattern: "\\binnovati(?:ve|on|ng)\\b"
    suggestion: "What's new about it? Say that instead."
  - pattern: "\\btransformati(?:ve|on|onal)\\b"
    suggestion: "What changed? Say that instead."
  - pattern: "\\bcutting[- ]edge\\b"
    suggestion: "Describe the specific advancement."
  - pattern: "\\bstate[- ]of[- ]the[- ]art\\b"
    suggestion: "Cite the benchmark or comparison."
  - pattern: "\\bgame[- ]chang(?:er|ing)\\b"
    suggestion: "Describe the specific impact."
  - pattern: "\\bparadigm shift\\b"
    suggestion: "Describe what shifted."
  - pattern: "\\bworld[- ]class\\b"
    suggestion: "Compared to what? Be specific."
  - pattern: "\\bnext[- ]level\\b"
    suggestion: "Describe the specific improvement."
  - pattern: "\\bbest[- ]in[- ]class\\b"
    suggestion: "Cite the comparison or benchmark."
  - pattern: "\\bscalable\\b"
    suggestion: "To what scale? Be specific."
  - pattern: "\\bactionable\\b"
    suggestion: "What action? Be specific."
  - pattern: "\\bimpactful\\b"
    suggestion: "What impact? Be specific."
  - pattern: "\\bgroundbreaking\\b"
    suggestion: "What did it break? Be specific."
  - pattern: "\\bpivot(?:al)?\\b"
    suggestion: "Often overused. Say what makes it important."
    note: "Fine when describing a startup pivot."
  - pattern: "\\bempower(?:s|ed|ing|ment)?\\b"
    suggestion: "What capability does it give? Say that."
  - pattern: "\\bunlock(?:s|ed|ing)?\\b"
    suggestion: "Say what became possible."
    note: "Fine for literal unlocking (doors, features)."
  - pattern: "\\belevat(?:e|es|ed|ing)\\b"
    suggestion: "Say how it improves."
    note: "Fine for literal elevation."
  - pattern: "\\boptimize\\b"
    suggestion: "What metric improves? Be specific."
    note: "Fine in technical optimization contexts."
  - pattern: "\\bstreamline\\b"
    suggestion: "What steps are removed?"
  - pattern: "\\bsupercharge\\b"
    suggestion: "Describe the actual acceleration."
  - pattern: "\\bbolster\\b"
    suggestion: "Use 'strengthen' or say what it does."

  # Connector overuse (flag when 3+ in a passage)
  - pattern: "\\badditionally\\b"
    suggestion: "Vary connectors or restructure."
  - pattern: "\\bfurthermore\\b"
    suggestion: "Vary connectors or restructure."
  - pattern: "\\bmoreover\\b"
    suggestion: "Vary connectors or restructure."

  # Generic hedging
  - pattern: "(?:it |this )depends on (?:various|many|a number of) factors"
    suggestion: "Name the factors."
  - pattern: "(?:various|many) (?:factors|considerations|aspects)"
    suggestion: "Name them."
  - pattern: "\\bthere are pros and cons\\b"
    suggestion: "List the specific pros and cons, or take a stance."
  - pattern: "the best approach depends on your (?:individual )?(?:needs|circumstances)"
    suggestion: "Give concrete guidance for common cases."
  - pattern: "\\barguably\\b"
    suggestion: "Commit to the argument or cite who argues it."
  - pattern: "\\bto some extent\\b"
    suggestion: "Quantify the extent."

  # Engagement bait
  - pattern: "what do you think\\?"
    suggestion: "Cut unless genuinely soliciting feedback."
  - pattern: "let me know (?:in the comments|your thoughts|what you think)"
    suggestion: "Cut engagement bait."
  - pattern: "stay tuned"
    suggestion: "Cut or give a specific date/deliverable."

# ── SEVERITY: LOW ───────────────────────────────────────────────────────────────
# Style nits. Not slop on their own but worth flagging in aggregate.
low:
  - pattern: "\\bdelve(?:s|d)? into\\b"
    suggestion: "Use 'explore', 'examine', or 'cover'."
  - pattern: "\\bnavigate the (?:landscape|complexities|world) of\\b"
    suggestion: "Just discuss the topic."
  - pattern: "\\btap(?:ping)? into\\b"
    suggestion: "Use 'use' or 'access'."
  - pattern: "\\bfoster(?:s|ed|ing)?\\b"
    suggestion: "Use 'encourage', 'build', or 'support'."
  - pattern: "\\bfacilitat(?:e|es|ed|ing)\\b"
    suggestion: "Use 'enable', 'help', or 'allow'."
  - pattern: "\\bdovetail(?:s|ed|ing)?\\b"
    suggestion: "Use 'complement' or 'align with'."
  - pattern: "\\bunderscore(?:s|d)?\\b"
    suggestion: "Use 'shows', 'highlights', or 'emphasizes'."
  - pattern: "\\bunravel\\b"
    suggestion: "Use 'explain' or 'investigate'."
  - pattern: "\\btapestry\\b"
    suggestion: "Use a more concrete metaphor."
  - pattern: "\\brealm\\b"
    suggestion: "Use 'area', 'field', or 'domain'."
  - pattern: "\\blandscape\\b"
    suggestion: "Use 'field', 'market', or 'space'."
    note: "Fine when describing actual landscapes."
  - pattern: "\\bjourney\\b"
    suggestion: "Use 'process', 'experience', or describe what happened."
    note: "Fine for actual travel."
  - pattern: "\\becosystem\\b"
    suggestion: "Use 'system', 'community', or 'market'."
    note: "Fine in biology contexts."
  - pattern: "\\bpivotal\\b"
    suggestion: "Use 'important' or 'critical'."
  - pattern: "\\bcommenced\\b"
    suggestion: "Use 'started' or 'began'."
  - pattern: "\\bascertain\\b"
    suggestion: "Use 'find out' or 'determine'."
  - pattern: "\\bameliorat(?:e|es|ed|ing)\\b"
    suggestion: "Use 'improve'."
  - pattern: "\\breadily\\b"
    suggestion: "Use 'easily' or cut."
  - pattern: "\\bmeticulous(?:ly)?\\b"
    suggestion: "Use 'careful(ly)' or 'thorough(ly)'."
  - pattern: "\\bplethora\\b"
    suggestion: "Use 'many' or a specific number."
  - pattern: "\\bmyriad\\b"
    suggestion: "Use 'many' or a specific number."
  - pattern: "\\bcraftsman(?:ship)?\\b"
    suggestion: "Often pretentious. Be specific about the quality."
    note: "Fine in woodworking/trade contexts."
  - pattern: "\\bwhilst\\b"
    suggestion: "Use 'while'."
  - pattern: "\\bhenceforth\\b"
    suggestion: "Use 'from now on'."
  - pattern: "\\bnotwithstanding\\b"
    suggestion: "Use 'despite' or 'regardless'."
  - pattern: "\\bthus\\b"
    suggestion: "Use 'so' or restructure."
    note: "Fine in formal/academic writing."
  - pattern: "\\bin the realm of\\b"
    suggestion: "Use 'in' or drop."
