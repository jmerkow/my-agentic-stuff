# ── Em dash in prose ──────────────────────────────────────────────────────────────
- rule: em-dash-prose
  level: info
  pattern: "—"
  suggestion: >-
    Em dash in prose. Readers dislike them, so rephrase rather than keep — but do
    NOT mechanically swap in a period, semicolon, or comma. The dash is usually
    there because two clauses have a real relationship. Restructure the sentence so
    that relationship is expressed without the dash. Bold lead-in labels like
    **Label** are exempt and fine.
  unless: "\\*\\*[^*]+\\*\\*\\s*—"
